[os]
name = "AuroraOS"
product = "linux-operating-system"
identity = "pixelated-classic-desktop"
base = ["linux-kernel", "wayland", "systemd", "pipewire", "networkmanager"]
profile = "auroraos-98-linux-desktop"

[targets.raspberry_pi_4]
arch = "aarch64"
gpu = "vc4-v3d"
boot = "u-boot-or-rpi-firmware"
priority = "primary"

[targets.raspberry_pi_5]
arch = "aarch64"
gpu = "v3d"
boot = "rpi-firmware"
priority = "primary"

[targets.pc_x86_64]
arch = "x86_64"
gpu = "mesa-drm"
boot = "systemd-boot"
priority = "secondary"

[performance]
idle_ram_mb_max = 700
boot_seconds_max = 10
desktop_fps_target = 60

[ui]
rule = "everything-visible-is-pixelated"
corners = "square"
scaling = "integer-only"
filter = "nearest-neighbor"
theme = "aurora-classic"

[profiles.auroraos_98_linux_desktop]
name = "AuroraOS 98"
base = "Linux"
display = "Wayland production, Xorg QEMU preview"
default_browser = "firefox"
purpose = "Linux desktop profile with Aurora UI and broad Linux application compatibility."

[components.task_manager]
source = "src/aurora-task-manager"
linux_backends = ["/proc", "cgroups", "systemd", "aurora-pi-hardwared"]
